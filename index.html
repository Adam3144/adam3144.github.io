<!DOCTYPE html>

<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Adam Ali</title>

    <link rel="icon" type="image/png" href="icon.png">

    <!-- Open Graph (SOCIAL PREVIEW) -->
    <meta property="og:title" content="Adam Ali">
    <meta property="og:description" content="View my latest releases!">
    <meta property="og:image" content="https://adam3144.github.io/preview.png">
    <meta property="og:url" content="https://adam3144.github.io/">
    <meta property="og:type" content="website">

    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #000;
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      #unity-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        display: block;
        background: #000;
      }
    </style>
  </head>

  <body>
    <canvas id="unity-canvas" tabindex="-1"></canvas>

    <script src="Build/Builds.loader.js"></script>
    <script>
      var canvas = document.querySelector("#unity-canvas");

      var config = {
        arguments: [],
        dataUrl: "Build/Builds.data",
        frameworkUrl: "Build/Builds.framework.js",
        codeUrl: "Build/Builds.wasm",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "DefaultCompany",
        productName: "Website Test",
        productVersion: "1.0",
      };

      // Mobile fullscreen fix
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no';
        document.head.appendChild(meta);
      }

      createUnityInstance(canvas, config);
    </script>
  </body>
</html>
